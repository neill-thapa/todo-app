<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
<script defer src="main.js"></script></head>
<body>
    <h1>This is a simple To-Do App</h1>
    <p>This is just the initial version of To-Do app with some basic styling.</p>
    <strong>Here's how to use it:</strong>
    <ul>
        <li>First create a project</li>
        <li>Select the project you want to add To-Dos to</li>
        <li>Then add the To-Do items</li>
    </ul>

    <div class="container">
        <div class="sidebar">
            <h2>Projects</h2>
            <div id="projects-list"></div>
            <button class="add-project">+ New Project</button>
        </div>

        <div class="main">
            <h2 id="project-title"></h2>
            <div id="todos-list"></div>
            <button class="add-todo">+ Add Todo</button>
        </div>
    </div>
</body>
</html>
